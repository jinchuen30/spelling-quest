<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spelling Quest</title>
<style>
/* ===== Spelling Quest — wooden-toy-blocks / picture-book aesthetic ===== */

:root{
  --paper:#fdf6e9; --paper-deep:#f6ead2; --ink:#453629; --muted:#93816e;
  --card:#fffdf7; --edge:#e7d9bf;
  --coral:#ff8a3d; --coral-deep:#e06a1d; --teal:#2bb3a3; --teal-deep:#1d8d80;
  --gold:#ffb520; --gold-soft:#ffe9b8; --rose:#f26d7e; --sky:#5aa7e0; --leaf:#8bbb4e;
  --lock:#cfc2ad; --shadow:rgba(90,60,20,.18);
  --block-face:#fffdf7; --block-edge:#e3d3b5;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#221c15; --paper-deep:#2b241b; --ink:#f3e8d7; --muted:#a99781;
    --card:#2e261c; --edge:#453a2a;
    --coral:#ff9550; --coral-deep:#c65f1c; --teal:#35c2b1; --teal-deep:#1d8d80;
    --gold:#ffbe3d; --gold-soft:#4a3a17; --lock:#57493a; --shadow:rgba(0,0,0,.45);
    --block-face:#3a3125; --block-edge:#241d13;
  }
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  margin:0; color:var(--ink); background:var(--paper);
  background-image:radial-gradient(var(--paper-deep) 1.6px, transparent 1.6px);
  background-size:26px 26px;
  font-family:ui-rounded,-apple-system,"Segoe UI",Verdana,sans-serif;
  user-select:none; -webkit-user-select:none;
  overflow-x:hidden;
}
button{ font-family:inherit; color:inherit; touch-action:manipulation; cursor:pointer; }
.screen{ min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; }
[hidden]{ display:none !important; }

/* ===== Start screen ===== */
#screen-start{ justify-content:center; position:relative; }
.start-inner{ display:flex; flex-direction:column; align-items:center; gap:18px; padding:24px; }
.title-blocks{ display:flex; gap:8px; }
.tblock{
  display:grid; place-items:center; width:52px; height:52px; border-radius:14px;
  font-size:30px; font-weight:800; color:#fff;
  box-shadow:0 5px 0 rgba(0,0,0,.18), 0 8px 14px var(--shadow);
  animation:bob 3.2s ease-in-out infinite;
}
.tblock:nth-child(2n){ animation-delay:.4s; }
.tblock:nth-child(3n){ animation-delay:.8s; }
.tblock.c1{ background:var(--coral); } .tblock.c2{ background:var(--teal); }
.tblock.c3{ background:var(--rose); }  .tblock.c4{ background:var(--sky); }
@keyframes bob{ 0%,100%{ transform:translateY(0) rotate(-1.5deg);} 50%{ transform:translateY(-7px) rotate(1.5deg);} }
.title-word{ margin:0; font-size:46px; font-weight:800; letter-spacing:1px; }
.sparkle{ color:var(--gold); }
.star-chip{
  background:var(--gold-soft); color:var(--ink); border:2px solid var(--gold);
  border-radius:999px; padding:8px 20px; font-size:22px; font-weight:800;
}
.star-chip.small{ font-size:17px; padding:5px 14px; }
.play-btn{
  width:132px; height:132px; border-radius:50%; border:none; margin-top:10px;
  background:var(--coral); color:#fff; font-size:56px; padding-left:10px;
  box-shadow:0 8px 0 var(--coral-deep), 0 16px 28px var(--shadow);
  animation:pulse 2s ease-in-out infinite;
}
.play-btn:active{ transform:translateY(6px); box-shadow:0 2px 0 var(--coral-deep); }
@keyframes pulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.05);} }
.start-hint{ color:var(--muted); font-size:18px; font-weight:700; margin:0; }
.parent-gear{
  position:absolute; right:14px; bottom:14px; width:44px; height:44px;
  border-radius:50%; border:2px solid var(--edge); background:var(--card);
  color:var(--muted); font-size:20px; opacity:.75;
}

/* ===== Level map ===== */
.map-head{
  width:100%; max-width:560px; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 4px; gap:10px;
}
.map-title{ margin:0; font-size:22px; font-weight:800; }
.chip-btn{
  min-width:48px; height:48px; border-radius:16px; border:2px solid var(--edge);
  background:var(--card); font-size:20px; box-shadow:0 3px 0 var(--edge);
}
.chip-btn:active{ transform:translateY(2px); box-shadow:none; }
.level-path{
  width:100%; max-width:430px; padding:18px 24px 60px; display:flex; flex-direction:column; gap:26px;
}
.level-node{
  --c:var(--teal); --cd:var(--teal-deep);
  position:relative; display:flex; align-items:center; gap:16px;
  border:none; background:var(--card); text-align:left;
  border-radius:22px; padding:14px 18px;
  box-shadow:0 5px 0 var(--edge), 0 10px 18px var(--shadow);
  width:86%;
}
.level-node:nth-child(odd){ align-self:flex-start; transform:rotate(-.6deg); }
.level-node:nth-child(even){ align-self:flex-end; transform:rotate(.6deg); }
.level-node:active:not(:disabled){ transform:translateY(3px); box-shadow:0 2px 0 var(--edge); }
.node-badge{
  flex:none; width:64px; height:64px; border-radius:20px; display:grid; place-items:center;
  background:var(--c); color:#fff; font-size:26px; font-weight:800;
  box-shadow:0 4px 0 var(--cd);
}
.level-node.n2 { --c:var(--coral); --cd:var(--coral-deep); }
.level-node.n3 { --c:var(--rose);  --cd:#c94b5c; }
.level-node.n4 { --c:var(--sky);   --cd:#3d83b8; }
.level-node.n5 { --c:var(--leaf);  --cd:#6d9739; }
.node-info{ display:flex; flex-direction:column; gap:2px; }
.node-title{ font-size:19px; font-weight:800; }
.node-sub{ font-size:14px; color:var(--muted); font-weight:700; letter-spacing:1px; }
.node-stars{ font-size:17px; letter-spacing:2px; color:var(--gold); }
.node-stars .off{ color:var(--lock); }
.level-node:disabled{ opacity:.55; }
.level-node:disabled .node-badge{ background:var(--lock); box-shadow:0 4px 0 var(--edge); }

/* ===== Play screen ===== */
.play-head{
  width:100%; max-width:620px; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 0; gap:10px;
}
.level-tag{ font-size:14px; font-weight:800; color:var(--muted); }
.progress-dots{ display:flex; gap:6px; }
.pdot{ width:12px; height:12px; border-radius:50%; background:var(--edge); }
.pdot.done{ background:var(--teal); }
.pdot.now{ background:var(--coral); transform:scale(1.3); }
.play-stage{
  flex:1; width:100%; max-width:620px; display:flex; flex-direction:column;
  align-items:center; gap:16px; padding:10px 20px 40px;
}
.badge-row{ min-height:28px; display:flex; gap:8px; }
.badge{
  border-radius:999px; padding:4px 14px; font-size:14px; font-weight:800;
}
.badge.sight{ background:var(--gold-soft); color:var(--ink); border:2px solid var(--gold); }
.badge.review{ background:var(--paper-deep); color:var(--muted); border:2px solid var(--edge); }
.say-btn{
  width:96px; height:96px; border-radius:50%; border:none;
  background:var(--sky); color:#fff; font-size:40px;
  box-shadow:0 6px 0 #3d83b8, 0 12px 20px var(--shadow);
}
.say-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #3d83b8; }
.feedback{ min-height:44px; font-size:26px; font-weight:800; text-align:center; }
.feedback .reveal-word{ font-size:40px; letter-spacing:6px; color:var(--teal); }

.slots{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; min-height:72px; }
.slot{
  width:64px; height:68px; border-radius:16px;
  border:3px dashed var(--edge); background:transparent;
  display:grid; place-items:center; font-size:34px; font-weight:800;
}
.slot.filled{
  border:none; background:var(--block-face);
  box-shadow:0 4px 0 var(--block-edge), 0 7px 12px var(--shadow);
}
.slot.ghost{ color:var(--muted); opacity:.55; }

.tiles{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; min-height:76px; max-width:480px; }
.tile{
  width:66px; height:70px; border-radius:16px; border:none;
  background:var(--block-face); color:var(--ink);
  font-size:34px; font-weight:800;
  box-shadow:0 5px 0 var(--block-edge), 0 9px 14px var(--shadow);
}
.tile:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--block-edge); }
.tile.used{ opacity:.22; pointer-events:none; }
.tile.wide{ width:auto; min-width:66px; padding:0 14px; }
.slot.wide{ width:auto; min-width:64px; padding:0 12px; }

.check-btn{
  border:none; border-radius:20px; padding:16px 44px; font-size:24px; font-weight:800;
  background:var(--teal); color:#fff;
  box-shadow:0 6px 0 var(--teal-deep), 0 12px 20px var(--shadow);
}
.check-btn:active:not(:disabled){ transform:translateY(4px); box-shadow:0 2px 0 var(--teal-deep); }
.check-btn:disabled{ opacity:.4; }

/* feedback animations */
@keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.25);} 100%{transform:scale(1);} }
.pop{ animation:pop .45s ease; }
@keyframes shake{ 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-9px);} 40%,80%{transform:translateX(9px);} }
.shake{ animation:shake .4s ease; }

/* ===== Round end ===== */
#screen-end{ justify-content:center; }
.end-inner{ display:flex; flex-direction:column; align-items:center; gap:20px; padding:24px; }
.end-stars{ display:flex; gap:14px; font-size:74px; }
.end-star{ color:var(--lock); transform:scale(.6); opacity:.5; transition:.3s; }
.end-star.lit{
  color:var(--gold); opacity:1;
  animation:starfly .6s cubic-bezier(.2,1.6,.4,1) forwards;
  text-shadow:0 6px 18px rgba(255,181,32,.5);
}
@keyframes starfly{ 0%{ transform:scale(.2) rotate(-40deg); } 100%{ transform:scale(1) rotate(0);} }
.end-message{ font-size:26px; font-weight:800; text-align:center; margin:0; }
.unlock-banner{
  background:var(--gold-soft); border:2px solid var(--gold); color:var(--ink);
  border-radius:999px; padding:10px 22px; font-size:19px; font-weight:800;
  animation:pop .5s ease;
}
.end-btns{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.big-btn{
  border:none; border-radius:20px; padding:16px 30px; font-size:20px; font-weight:800;
  background:var(--coral); color:#fff; box-shadow:0 5px 0 var(--coral-deep);
}
.big-btn:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--coral-deep); }
.big-btn.ghost{ background:var(--card); color:var(--ink); box-shadow:0 5px 0 var(--edge); border:2px solid var(--edge); }

/* ===== Parent corner ===== */
.pc-overlay{
  position:fixed; inset:0; background:rgba(40,30,15,.45); z-index:50;
  display:flex; align-items:flex-start; justify-content:center; overflow-y:auto; padding:20px 12px;
}
.pc-panel{
  background:var(--card); border-radius:22px; width:100%; max-width:520px;
  padding:20px 22px 26px; box-shadow:0 18px 50px rgba(0,0,0,.35);
}
.pc-head{ display:flex; align-items:center; justify-content:space-between; }
.pc-head h2{ margin:0; font-size:22px; }
.pc-section{ margin-top:20px; }
.pc-section h3{ margin:0 0 10px; font-size:16px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.pc-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin:10px 0; }
.pc-row.wrap{ flex-wrap:wrap; justify-content:flex-start; }
.pc-row label{ font-weight:700; font-size:16px; }
.pc-row select,.pc-row input[type=range]{ font-size:16px; padding:8px 10px; border-radius:10px; border:2px solid var(--edge); background:var(--paper); color:var(--ink); max-width:56%; }
.pc-btn{
  border:2px solid var(--edge); border-radius:14px; background:var(--paper);
  padding:12px 16px; font-size:15px; font-weight:700; display:inline-block;
}
.pc-btn.danger{ border-color:var(--rose); color:var(--rose); }
.file-label{ cursor:pointer; }
.pc-note{ font-size:13.5px; color:var(--muted); line-height:1.5; }
.report-days{ display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; }
.rday{
  width:30px; height:38px; border-radius:8px; background:var(--paper-deep);
  display:grid; place-items:center; font-size:11px; color:var(--muted); font-weight:700;
}
.rday.did{ background:var(--teal); color:#fff; }
.report-table{ width:100%; font-size:15px; border-collapse:collapse; }
.report-table td,.report-table th{ padding:6px 4px; text-align:left; border-bottom:1px solid var(--edge); }
.mastered-chip{ color:var(--teal); font-weight:800; }
.unlock-list{ display:flex; flex-wrap:wrap; gap:8px; }
.unlock-item{ font-size:14px; }

</style>
</head>
<body>

<!-- ======== START SCREEN ======== -->
<main id="screen-start" class="screen">
  <div class="start-inner">
    <div class="title-blocks" aria-hidden="true">
      <span class="tblock c1">S</span><span class="tblock c2">p</span><span class="tblock c3">e</span><span class="tblock c4">l</span><span class="tblock c1">l</span><span class="tblock c2">i</span><span class="tblock c3">n</span><span class="tblock c4">g</span>
    </div>
    <h1 class="title-word">Quest <span class="sparkle">✦</span></h1>
    <div id="total-stars" class="star-chip">⭐ 0</div>
    <button id="btn-start" class="play-btn" aria-label="Play">▶</button>
    <p class="start-hint">Tap to play!</p>
  </div>
  <button id="btn-parent" class="parent-gear" aria-label="Parent corner">⚙</button>
</main>

<!-- ======== LEVEL MAP ======== -->
<main id="screen-map" class="screen" hidden>
  <header class="map-head">
    <button id="btn-home" class="chip-btn" aria-label="Home">🏠</button>
    <h2 class="map-title">Pick a level</h2>
    <div id="map-stars" class="star-chip small">⭐ 0</div>
  </header>
  <div id="level-path" class="level-path"></div>
</main>

<!-- ======== PLAY SCREEN ======== -->
<main id="screen-play" class="screen" hidden>
  <header class="play-head">
    <button id="btn-back-map" class="chip-btn" aria-label="Back to map">🗺</button>
    <div id="play-progress" class="progress-dots"></div>
    <div id="play-level-tag" class="level-tag"></div>
  </header>

  <div class="play-stage">
    <div id="badge-row" class="badge-row"></div>
    <button id="btn-say" class="say-btn" aria-label="Say it again">🔊</button>
    <div id="feedback" class="feedback" aria-live="polite"></div>
    <div id="slots" class="slots"></div>
    <div id="tiles" class="tiles"></div>
    <button id="btn-check" class="check-btn" disabled>Check ✓</button>
  </div>
</main>

<!-- ======== ROUND END ======== -->
<main id="screen-end" class="screen" hidden>
  <div class="end-inner">
    <div id="end-stars" class="end-stars">
      <span class="end-star">★</span><span class="end-star">★</span><span class="end-star">★</span>
    </div>
    <p id="end-message" class="end-message"></p>
    <div id="unlock-banner" class="unlock-banner" hidden>🔓 New level unlocked!</div>
    <div class="end-btns">
      <button id="btn-again" class="big-btn ghost">Play again ↻</button>
      <button id="btn-map" class="big-btn">Level map 🗺</button>
    </div>
  </div>
</main>

<!-- ======== PARENT CORNER (overlay) ======== -->
<div id="parent-corner" class="pc-overlay" hidden>
  <div class="pc-panel">
    <div class="pc-head">
      <h2>Parent corner</h2>
      <button id="btn-close-parent" class="chip-btn" aria-label="Close">✕</button>
    </div>

    <section class="pc-section">
      <h3>Practice report</h3>
      <div id="parent-report"></div>
    </section>

    <section class="pc-section">
      <h3>Settings</h3>
      <div class="pc-row">
        <label for="set-items-per-round">Items per round</label>
        <select id="set-items-per-round">
          <option value="6">6</option><option value="8">8</option>
          <option value="10" selected>10</option><option value="12">12</option>
        </select>
      </div>
      <div class="pc-row">
        <label for="set-voice">Voice</label>
        <select id="set-voice"><option value="">Automatic</option></select>
      </div>
      <div class="pc-row">
        <label for="set-rate">Speed <span id="rate-value">0.8</span></label>
        <input id="set-rate" type="range" min="0.6" max="1.0" step="0.05" value="0.8">
      </div>
    </section>

    <section class="pc-section">
      <h3>Unlock levels</h3>
      <div id="unlock-list" class="unlock-list"></div>
    </section>

    <section class="pc-section">
      <h3>Save file</h3>
      <div class="pc-row wrap">
        <button id="btn-export" class="pc-btn">⬇ Export save</button>
        <label class="pc-btn file-label">⬆ Import save<input id="file-import" type="file" accept=".json,application/json" hidden></label>
        <button id="btn-reset" class="pc-btn danger">Reset progress</button>
      </div>
      <p class="pc-note">Export makes a small backup file. Keep it in Files/iCloud — if Safari ever clears the app's memory, Import brings everything back.</p>
    </section>
  </div>
</div>

<script>
/* Content pack — data only, no logic, no DOM. (Plan-C connector: a future
   "Math pack" or "Chinese pack" is just another object of this shape.)
   Word data copied from spelling-practice.html (v1): Jolly Phonics 7 groups,
   classic word families, Dolch pre-primer + primer sight words. */

const SPELLING_PACK = {
  id: "spelling-en",
  name: "English Spelling",

  // Cue words for sounds: voice says the cue word; child picks the letter(s).
  cueWords: {
    s: "snake", a: "apple", t: "tap", i: "igloo", p: "pig", n: "net",
    c: "cat", k: "kite", e: "egg", h: "hat", r: "rabbit", m: "mouse", d: "dog",
    g: "goat", o: "octopus", u: "umbrella", l: "lion", f: "fish", b: "ball",
    j: "jam", z: "zip", w: "wind", v: "van", y: "yoyo", x: "box",
    ai: "rain", oa: "boat", ie: "pie", ee: "bee", or: "fork", ng: "ring",
    oo: "moon", ch: "chip", sh: "ship", th: "thumb", qu: "queen", ou: "cloud",
    oi: "coin", ue: "glue", er: "fern", ar: "star"
  },

  // Dolch pre-primer + primer high-frequency words ("I" lowercased for tiles).
  sightWordPool: [
    "a","and","away","big","blue","can","come","down","find","for","funny","go","help","here",
    "i","in","is","it","jump","little","look","make","me","my","not","one","play","red","run",
    "said","see","the","three","to","two","up","we","where","yellow","you",
    "all","am","are","at","ate","be","black","brown","but","came","did","do","eat","four","get",
    "good","have","he","into","like","must","new","no","now","on","our","out","please","pretty",
    "ran","ride","saw","say","she","so","soon","that","there","they","this","too","under","want",
    "was","well","went","what","white","who","will","with","yes"
  ],

  levels: [
    { id: "g1", title: "Letter Sounds 1", subtitle: "s a t i p n",
      playType: "pick-letter", pool: ["s","a","t","i","p","n"], distractors: 0, sightWords: 0 },
    { id: "g2", title: "Letter Sounds 2", subtitle: "c k e h r m d",
      playType: "pick-letter", pool: ["c","k","e","h","r","m","d"], distractors: 0, sightWords: 0 },
    { id: "g3", title: "Letter Sounds 3", subtitle: "g o u l f b",
      playType: "pick-letter", pool: ["g","o","u","l","f","b"], distractors: 0, sightWords: 0 },
    { id: "g4", title: "Sound Teams 1", subtitle: "ai j oa ie ee or",
      playType: "pick-letter", pool: ["ai","j","oa","ie","ee","or"], distractors: 0, sightWords: 0 },
    { id: "g5", title: "Sound Teams 2", subtitle: "z w ng v oo",
      playType: "pick-letter", pool: ["z","w","ng","v","oo"], distractors: 0, sightWords: 0 },
    { id: "g6", title: "Sound Teams 3", subtitle: "y x ch sh th",
      playType: "pick-letter", pool: ["y","x","ch","sh","th"], distractors: 0, sightWords: 0 },
    { id: "g7", title: "Sound Teams 4", subtitle: "qu ou oi ue er ar",
      playType: "pick-letter", pool: ["qu","ou","oi","ue","er","ar"], distractors: 0, sightWords: 0 },

    { id: "cvc", title: "Word Builder", subtitle: "cat · dog · pin",
      playType: "build-word", distractors: 1, sightWords: 2, pool: [
      "cat","hat","mat","bat","rat","sat","pat","bad","dad","sad","mad","bag","tag","rag",
      "cap","map","tap","nap","can","man","pan","ran","van","bed","red","led","ten","pen",
      "hen","men","net","jet","pet","wet","get","leg","peg","pig","dig","big","fig","wig",
      "pin","win","bin","tin","sit","hit","bit","fit","lip","tip","rip","zip","hot","pot",
      "dot","log","dog","fog","box","fox","top","mop","hop","sun","run","bun","fun","mug",
      "bug","rug","hug","cup","cut","nut","bus"] },

    { id: "beg", title: "Start Blends", subtitle: "stop · snap",
      playType: "build-word", distractors: 2, sightWords: 2, pool: [
      "stop","step","spin","spot","snap","snip","swim","swan","skip","skin","scan","slug",
      "slip","slim","slam","clap","clip","club","crab","crib","flag","flap","flat","frog",
      "from","grab","grin","grip","plan","plug","trip","trap","drum","drip","drop","twin",
      "spun","stem","glad","brick"] },

    { id: "end", title: "End Blends", subtitle: "hand · jump",
      playType: "build-word", distractors: 2, sightWords: 2, pool: [

<script>
/* Storage adapter — the ONLY gatekeeper for persistence (Plan-C connector:
   swap this one object for an app database; engine/UI never touch storage). */
function createStorage(backend) {
  var KEY = "spellingApp.v1";
  var state = {};
  try { state = JSON.parse(backend.getItem(KEY) || "{}") || {}; } catch (e) { state = {}; }

  function flush() {
    try { backend.setItem(KEY, JSON.stringify(state)); }
    catch (e) { /* storage full/blocked: keep running in memory */ }
  }
  function copy(v) { return v === undefined ? v : JSON.parse(JSON.stringify(v)); }

  return {
    get: function (key, fallback) { return key in state ? copy(state[key]) : copy(fallback); },
    set: function (key, value) { state[key] = copy(value); flush(); },
    exportAll: function () {
      return JSON.stringify({ format: KEY, exportedAt: new Date().toISOString(), data: state }, null, 2);
    },
    importAll: function (jsonString) {
      try {
        var parsed = JSON.parse(jsonString);
        if (!parsed || parsed.format !== KEY || typeof parsed.data !== "object" || parsed.data === null) return false;
        state = parsed.data; flush(); return true;
      } catch (e) { return false; }
    },
    resetAll: function () { state = {}; try { backend.removeItem(KEY); } catch (e) {} }
  };
}
if (typeof module !== "undefined") { module.exports = { createStorage: createStorage }; }

<script>
/* Game engine — no DOM, no direct storage access. (Plan-C connector:
   this file is portable to a future real app unchanged.) */
function createEngine(pack, store, rng) {
  rng = rng || Math.random;
  var DEFAULT_SETTINGS = { itemsPerRound: 10, voiceName: null, speechRate: 0.8 };

  // ---- Settings ----
  function getSettings() {
    var saved = store.get("settings", {});
    var out = {};
    for (var k in DEFAULT_SETTINGS) out[k] = (k in saved) ? saved[k] : DEFAULT_SETTINGS[k];
    return out;
  }
  function setSetting(key, value) {
    var s = store.get("settings", {});
    s[key] = value;
    store.set("settings", s);
  }

  // ---- Levels ----
  function getLevels() {
    var stars = store.get("stars", {});
    var unlocked = store.get("unlocked", {});
    return pack.levels.map(function (lvl, i) {
      var open = i === 0 || unlocked[lvl.id] === true ||
                 (stars[pack.levels[i - 1].id] || 0) >= 1;
      return { id: lvl.id, title: lvl.title, subtitle: lvl.subtitle,
               playType: lvl.playType, stars: stars[lvl.id] || 0, unlocked: open };
    });
  }
  function unlockLevel(id) {
    var u = store.get("unlocked", {});
    u[id] = true;
    store.set("unlocked", u);
  }
  function getTotalStars() {
    var s = store.get("stars", {}), t = 0;
    for (var k in s) t += s[k];
    return t;
  }

  // ---- Round dealing ----
  function shuffled(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function sample(arr, n) { return shuffled(arr).slice(0, n); }

  function cuePhrase(sound) {
    var kw = pack.cueWords[sound] || sound;
    if (sound.length === 2) return kw + ". Which two letters make that sound?";
    if (sound === "x") return kw + ". Which letter does it END with?";
    return kw + ". Which letter does it start with?";
  }

  function makeTiles(word, distractors) {
    var letters = word.split("");
    var pool = "abcdefghijklmnopqrstuvwxyz".split("").filter(function (c) {
      return letters.indexOf(c) === -1;
    });
    return shuffled(letters.concat(sample(pool, distractors)));
  }

  function dealItems(lvl, settings) {
    var n = settings.itemsPerRound;
    if (lvl.playType === "pick-letter") {
      return sample(lvl.pool, Math.min(n, lvl.pool.length)).map(function (s) {
        return { answer: s, sight: false, playType: "pick-letter",
                 say: cuePhrase(s), tiles: shuffled(lvl.pool) };
      });
    }
    // build-word: sight words + pool picks, with "learning" words injected first
    var words = store.get("words", {});
    var learning = lvl.pool.filter(function (w) { return words[w] && words[w].status === "learning"; });
    var sightPicks = sample(pack.sightWordPool, Math.min(lvl.sightWords, n));
    var poolPicks = sample(lvl.pool.filter(function (w) { return learning.indexOf(w) === -1; }),
                           Math.max(0, n - sightPicks.length));
    var inject = sample(learning, Math.min(3, learning.length, poolPicks.length));
    poolPicks = inject.concat(poolPicks.slice(inject.length));
    function toItem(w, sight) {
      return { answer: w, sight: sight, playType: "build-word",
               say: w, tiles: makeTiles(w, lvl.distractors) };
    }
    return shuffled(poolPicks.map(function (w) { return toItem(w, false); })
          .concat(sightPicks.map(function (w) { return toItem(w, true); })));
  }

  function startRound(levelId) {
    var lvl = null;
    for (var i = 0; i < pack.levels.length; i++) if (pack.levels[i].id === levelId) lvl = pack.levels[i];
    if (!lvl) throw new Error("unknown level: " + levelId);
    var queue = dealItems(lvl, getSettings());
    var idx = 0;
    var attempts = 0;          // tries on the current presentation
    var correctCount = 0;      // scored items answered without reveal
    var wordUpdates = store.get("words", {}); // working copy, written back in finish()

    function recordWord(item, ok) {
      // Only real (non-sight) build-word items join the mastery ledger.
      if (item.playType !== "build-word" || item.sight) return;
      var w = wordUpdates[item.answer];
      if (ok) {
        if (w && w.status === "learning") {
          w.streak += 1;
          if (w.streak >= 2) w.status = "mastered";
        }
      } else {
        if (!w) { w = { status: "learning", wrong: 0, streak: 0 }; wordUpdates[item.answer] = w; }
        w.status = "learning"; w.wrong += 1; w.streak = 0;
      }
    }

    function current() {
      if (idx >= queue.length) return null;
      var it = queue[idx];
      return { answer: it.answer, sight: it.sight, playType: it.playType,
               say: it.say, tiles: it.tiles.slice(), isReview: !!it.isReview };
    }
    function size() {
      var n = 0;
      for (var i = 0; i < queue.length; i++) if (!queue[i].isReview) n++;
      return n;
    }
    function position() {
      var p = 0;
      for (var i = 0; i <= Math.min(idx, queue.length - 1); i++) if (!queue[i].isReview) p++;
      return p;
    }
    function skipForTest() { // advance without answering (tests only)
      attempts = 0;
      idx += 1;
      return current();
    }

    function submit(attempt) {
      var item = queue[idx];
      var ok = String(attempt).toLowerCase() === item.answer.toLowerCase();
      attempts += 1;
      if (ok) {
        if (!item.isReview) { correctCount += 1; recordWord(item, true); }
        return { correct: true, attemptNo: attempts, reveal: null, itemDone: true };
      }
      if (attempts === 1) {
        return { correct: false, attemptNo: 1, reveal: null, itemDone: false };
      }
      // second miss: reveal, score as wrong, re-queue one unscored practice copy
      if (!item.isReview) {
        recordWord(item, false);
        var copy = { answer: item.answer, sight: item.sight, playType: item.playType,
                     say: item.say, tiles: shuffled(item.tiles), isReview: true };
        queue.splice(Math.min(idx + 3, queue.length), 0, copy);
      }
      return { correct: false, attemptNo: attempts, reveal: item.answer, itemDone: true };
    }

    function next() {
      attempts = 0;
      idx += 1;
      return current();
    }

    function finish() {
      var total = size();
      var pct = total ? correctCount / total : 0;
      var stars = pct >= 1 ? 3 : pct >= 0.8 ? 2 : pct >= 0.6 ? 1 : 0;

      var starsMap = store.get("stars", {});
      var oldStars = starsMap[lvl.id] || 0;

      // was the next level already open before this result?
      var li = pack.levels.indexOf(lvl);
      var nextLvl = li + 1 < pack.levels.length ? pack.levels[li + 1] : null;
      var unlockedMap = store.get("unlocked", {});
      var wasOpen = nextLvl ? (unlockedMap[nextLvl.id] === true || oldStars >= 1) : true;

      starsMap[lvl.id] = Math.max(oldStars, stars); // best result sticks
      store.set("stars", starsMap);
      store.set("words", wordUpdates);

      var log = store.get("log", {});
      var today = new Date().toISOString().slice(0, 10);
      log[today] = (log[today] || 0) + 1;
      store.set("log", log);

      var unlockedNext = (nextLvl && !wasOpen && stars >= 1) ? nextLvl.id : null;
      return { correct: correctCount, total: total, stars: stars, unlockedNext: unlockedNext };
    }

    return { current: current, size: size, position: position, skipForTest: skipForTest,
             submit: submit, next: next, finish: finish };
  }

  return {
    getLevels: getLevels,
    unlockLevel: unlockLevel,
    getSettings: getSettings,
    setSetting: setSetting,
    getTotalStars: getTotalStars,
    startRound: startRound
  };
}
if (typeof module !== "undefined") { module.exports = { createEngine: createEngine }; }

</script>
<script>
/* Audio — Web Speech (built-in voices, offline) + WebAudio chimes (no files).
   All functions no-op gracefully when the browser lacks the APIs. */
function createAudio() {
  var synth = (typeof speechSynthesis !== "undefined") ? speechSynthesis : null;
  var Ctx = (typeof AudioContext !== "undefined") ? AudioContext :
            (typeof webkitAudioContext !== "undefined" ? webkitAudioContext : null);
  var ctx = null;
  var voices = [];

  // Known clear, kid-friendly voices (mostly female), best first.
  // Apple devices ship several of these; Chrome adds the Google ones.
  var PREFERRED = ["Samantha", "Karen", "Kate", "Serena", "Moira", "Tessa",
                   "Martha", "Google UK English Female", "Google US English"];

  function voiceRank(v) {
    for (var i = 0; i < PREFERRED.length; i++) {
      if (v.name.indexOf(PREFERRED[i]) === 0) return i;          // best: known-good list
    }
    if (/GB/i.test(v.lang)) return PREFERRED.length;             // then any UK English
    return PREFERRED.length + 1;                                  // then other English
  }

  function refreshVoices() {
    if (!synth) return;
    var all = synth.getVoices() || [];
    voices = all.filter(function (v) { return /^en/i.test(v.lang); })
                .sort(function (a, b) { return voiceRank(a) - voiceRank(b); });
  }
  if (synth) {
    refreshVoices();
    if (typeof synth.addEventListener === "function") {
      synth.addEventListener("voiceschanged", refreshVoices);
    }
  }

  function speak(text, settings) {
    if (!synth) return;
    settings = settings || {};
    var u = new SpeechSynthesisUtterance(text);
    u.rate = settings.speechRate || 0.8;
    u.lang = "en-GB";
    if (settings.voiceName) {
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].name === settings.voiceName) { u.voice = voices[i]; u.lang = voices[i].lang; break; }
      }
    } else if (voices.length) {
      u.voice = voices[0]; u.lang = voices[0].lang;
    }
    synth.cancel();
    synth.speak(u);
  }

  function listVoices() {
    refreshVoices();
    return voices.map(function (v) { return { name: v.name, lang: v.lang }; });
  }

  // ---- Chimes: tiny tone sequences, generated on the fly ----
  function note(freq, start, dur, vol) {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime + start);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.05);
  }

  function chime(kind) {
    if (!Ctx) return;
    try {
      if (!ctx) ctx = new Ctx(); // lazily created = after a user gesture
      if (ctx.state === "suspended") ctx.resume();
      if (kind === "correct") { note(660, 0, 0.16, 0.25); note(880, 0.14, 0.22, 0.25); }
      else if (kind === "wrong") { note(220, 0, 0.25, 0.18); }
      else if (kind === "fanfare") {
        note(523, 0, 0.15, 0.22); note(659, 0.13, 0.15, 0.22);
        note(784, 0.26, 0.15, 0.22); note(1047, 0.39, 0.35, 0.26);
      }
    } catch (e) { /* audio unavailable: stay silent, never crash the game */ }
  }

  return { speak: speak, listVoices: listVoices, chime: chime };
}
if (typeof module !== "undefined") { module.exports = { createAudio: createAudio }; }

</script>
<script>
/* UI layer — wires the DOM to the engine. Talks to the engine's public
   functions only; persistence goes through the storage adapter alone. */
(function () {
  "use strict";

  // ---- Bootstrap ----
  var store = createStorage(window.localStorage);
  var engine = createEngine(SPELLING_PACK, store);
  var audio = createAudio();

  var $ = function (id) { return document.getElementById(id); };

  var NODE_COLORS = ["", "n2", "n3", "n4", "n5"]; // rotating accent classes

  function showScreen(id) {
    ["screen-start", "screen-map", "screen-play", "screen-end"].forEach(function (s) {
      $(s).hidden = (s !== id);
    });
  }

  function starRow(n) {
    var out = "";
    for (var i = 0; i < 3; i++) {
      out += i < n ? "★" : "<span class=\"off\">★</span>";
    }
    return out;
  }

  function refreshStarChips() {
    var t = "⭐ " + engine.getTotalStars();
    $("total-stars").textContent = t;
    $("map-stars").textContent = t;
  }

  // ---- Level map ----
  function renderMap() {
    refreshStarChips();
    var path = $("level-path");
    path.innerHTML = "";
    engine.getLevels().forEach(function (lvl, i) {
      var btn = document.createElement("button");
      btn.className = "level-node " + NODE_COLORS[i % NODE_COLORS.length];
      btn.setAttribute("data-level-id", lvl.id);
      btn.disabled = !lvl.unlocked;
      btn.innerHTML =
        "<span class=\"node-badge\">" + (lvl.unlocked ? (i + 1) : "🔒") + "</span>" +
        "<span class=\"node-info\">" +
          "<span class=\"node-title\">" + lvl.title + "</span>" +
          "<span class=\"node-sub\">" + lvl.subtitle + "</span>" +
          "<span class=\"node-stars\">" + starRow(lvl.stars) + "</span>" +
        "</span>";
      if (lvl.unlocked) {
        btn.addEventListener("click", function () { enterLevel(lvl.id); });
      }
      path.appendChild(btn);
    });
  }

  // ---- Play screen ----
  var round = null;
  var item = null;
  var copyMode = false;   // after a reveal: child copies the shown answer
  var inputLocked = false;
  var PRAISE = ["Wow! 🎉", "Super! ⭐", "Yes! 🎉", "Great job! 🌟", "Amazing! 🎈"];

  function enterLevel(levelId) {
    lastLevelId = levelId;
    round = engine.startRound(levelId);
    var lvl = engine.getLevels().filter(function (l) { return l.id === levelId; })[0];
    $("play-level-tag").textContent = lvl ? lvl.title : "";
    showScreen("screen-play");
    renderItem(round.current());
  }

  function renderProgress() {
    var el = $("play-progress");
    el.innerHTML = "";
    var total = round.size(), pos = round.position();
    for (var i = 1; i <= total; i++) {
      var d = document.createElement("span");
      d.className = "pdot" + (i < pos ? " done" : i === pos ? " now" : "");
      el.appendChild(d);
    }
  }

  function slotEls() { return Array.prototype.slice.call($("slots").children); }
  function tileEls() { return Array.prototype.slice.call($("tiles").children); }

  function renderItem(it) {
    item = it;
    copyMode = false;
    inputLocked = false;
    renderProgress();

    var badges = "";
    if (it.sight) badges += "<span class=\"badge sight\">⭐ just remember this one</span>";
    if (it.isReview) badges += "<span class=\"badge review\">↻ practice</span>";
    $("badge-row").innerHTML = badges;
    $("feedback").textContent = "";

    // Slots: one per letter for words; a single wide slot for sounds ("ai" etc.)
    var slots = $("slots");
    slots.innerHTML = "";
    var slotCount = it.playType === "pick-letter" ? 1 : it.answer.length;
    for (var i = 0; i < slotCount; i++) {
      var s = document.createElement("div");
      s.className = "slot" + (it.playType === "pick-letter" && it.answer.length > 1 ? " wide" : "");
      s.addEventListener("click", onSlotTap);
      slots.appendChild(s);
    }

    // Tiles
    var tiles = $("tiles");
    tiles.innerHTML = "";
    it.tiles.forEach(function (t) {
      var b = document.createElement("button");
      b.className = "tile" + (t.length > 1 ? " wide" : "");
      b.textContent = t;
      b.addEventListener("click", function () { placeTile(b); });
      tiles.appendChild(b);
    });

    updateCheck();
    setTimeout(function () { audio.speak(it.say, engine.getSettings()); }, 350);

    // test hook: only active when the page is opened with #test in the URL
    if (window.location.hash === "#test") window.__debugCurrentAnswer = it.answer;
  }

  function placeTile(tileBtn) {
    if (inputLocked || tileBtn.classList.contains("used")) return;
    var empty = slotEls().filter(function (s) { return !s.classList.contains("filled"); })[0];
    if (!empty) return;
    empty.textContent = tileBtn.textContent;
    empty.classList.add("filled");
    empty.classList.remove("ghost");
    empty._tile = tileBtn;
    tileBtn.classList.add("used");
    updateCheck();
  }

  function onSlotTap(e) {
    if (inputLocked) return;
    var s = e.currentTarget;
    if (!s.classList.contains("filled")) return;
    if (s._tile) s._tile.classList.remove("used");
    s._tile = null;
    s.textContent = "";
    s.classList.remove("filled");
    if (copyMode) ghostSlots(); // restore the grey hint letters
    updateCheck();
  }

  function currentAttempt() {
    return slotEls().map(function (s) { return s.classList.contains("filled") ? s.textContent : ""; }).join("");
  }
  function allFilled() {
    return slotEls().every(function (s) { return s.classList.contains("filled"); });
  }
  function updateCheck() { $("btn-check").disabled = !allFilled(); }

  function clearSlots() {
    slotEls().forEach(function (s) {
      if (s._tile) s._tile.classList.remove("used");
      s._tile = null;
      s.textContent = "";
      s.classList.remove("filled", "ghost");
    });
    updateCheck();
  }

  function ghostSlots() {
    // grey hint letters for copy mode (only on empty slots)
    var parts = item.playType === "pick-letter" ? [item.answer] : item.answer.split("");
    slotEls().forEach(function (s, i) {
      if (!s.classList.contains("filled")) {
        s.textContent = parts[i];
        s.classList.add("ghost");
      }
    });
  }

  function celebrate(msg, then) {
    inputLocked = true;
    audio.chime("correct");
    $("feedback").textContent = msg;
    $("slots").classList.add("pop");
    setTimeout(function () {
      $("slots").classList.remove("pop");
      then();
    }, 950);
  }

  function onCheck() {
    if (inputLocked || !allFilled()) return;
    var attempt = currentAttempt();

    if (copyMode) { // copying the revealed answer — not scored
      if (attempt.toLowerCase() === item.answer.toLowerCase()) {
        celebrate("That's it! 👍", advance);
      } else {
        audio.chime("wrong");
        $("slots").classList.add("shake");
        setTimeout(function () {
          $("slots").classList.remove("shake");
          clearSlots();
          ghostSlots();
        }, 420);
      }
      return;
    }

    var res = round.submit(attempt);
    if (res.correct) {
      celebrate(PRAISE[Math.floor(Math.random() * PRAISE.length)], advance);
    } else if (!res.itemDone) {
      audio.chime("wrong");
      $("feedback").textContent = "Try again! 💪";
      $("slots").classList.add("shake");
      setTimeout(function () {
        $("slots").classList.remove("shake");
        clearSlots();
        audio.speak(item.say, engine.getSettings());
      }, 450);
    } else { // second miss: reveal + copy
      audio.chime("wrong");
      copyMode = true;
      $("feedback").innerHTML = "It's&nbsp;<span class=\"reveal-word\">" + item.answer + "</span>&nbsp;— copy it!";
      clearSlots();
      ghostSlots();
    }
  }

  function advance() {
    var nextItem = round.next();
    if (nextItem) {
      renderItem(nextItem);
    } else {
      showEnd(round.finish());
    }
  }

  // ---- Round end ----
  var lastLevelId = null;

  function showEnd(result) {
    showScreen("screen-end");
    var stars = Array.prototype.slice.call($("end-stars").children);
    stars.forEach(function (s) { s.classList.remove("lit"); });
    $("end-message").textContent =
      result.stars === 3 ? "Perfect! You're a spelling champion!" :
      result.stars === 2 ? "Great job!" :
      result.stars === 1 ? "Well done — keep going!" :
                           "Good try! Let's practise this one again 💪";
    $("unlock-banner").hidden = !result.unlockedNext;

    // light the stars one by one
    for (var i = 0; i < result.stars; i++) {
      (function (i) {
        setTimeout(function () { stars[i].classList.add("lit"); }, 350 + i * 450);
      })(i);
    }
    if (result.stars >= 1) {
      setTimeout(function () { audio.chime("fanfare"); }, 350);
    }
  }

  $("btn-again").addEventListener("click", function () {
    if (lastLevelId) enterLevel(lastLevelId);
  });
  $("btn-map").addEventListener("click", function () {
    renderMap();
    showScreen("screen-map");
  });

  // ---- Drag support (secondary to tap) ----
  var dragTile = null, dragGhostEl = null;
  $("tiles").addEventListener("pointerdown", function (e) {
    var t = e.target;
    if (!t.classList || !t.classList.contains("tile") || t.classList.contains("used") || inputLocked) return;
    dragTile = t;
  });
  document.addEventListener("pointermove", function (e) {
    if (!dragTile) return;
    if (!dragGhostEl) { // start visual drag only after real movement
      dragGhostEl = dragTile.cloneNode(true);
      dragGhostEl.style.cssText = "position:fixed;z-index:99;pointer-events:none;opacity:.85;margin:0;";
      document.body.appendChild(dragGhostEl);
    }
    dragGhostEl.style.left = (e.clientX - 33) + "px";
    dragGhostEl.style.top = (e.clientY - 35) + "px";
  }, { passive: true });
  document.addEventListener("pointerup", function (e) {
    if (!dragTile) return;
    if (dragGhostEl) {
      dragGhostEl.remove();
      var target = document.elementFromPoint(e.clientX, e.clientY);
      var slot = target && target.closest ? target.closest(".slot") : null;
      if (slot && !slot.classList.contains("filled")) {
        // place into the specific slot under the finger
        slot.textContent = dragTile.textContent;
        slot.classList.add("filled");
        slot.classList.remove("ghost");
        slot._tile = dragTile;
        dragTile.classList.add("used");
        updateCheck();
      }
    }
    dragTile = null; dragGhostEl = null;
  });

  $("btn-check").addEventListener("click", onCheck);
  $("btn-say").addEventListener("click", function () {
    if (item) audio.speak(item.say, engine.getSettings());
  });
  $("btn-back-map").addEventListener("click", function () {
    round = null; item = null;
    renderMap();
    showScreen("screen-map");
  });

  // ---- Events ----
  $("btn-start").addEventListener("click", function () {
    audio.chime("correct"); // first gesture also unlocks audio on iPad
    renderMap();
    showScreen("screen-map");
  });
  $("btn-home").addEventListener("click", function () {
    refreshStarChips();
    showScreen("screen-start");
  });

  // ---- Parent corner ----
  function openParent() {
    renderReport();
    renderParentSettings();
    renderUnlockList();
    $("parent-corner").hidden = false;
  }
  function closeParent() {
    $("parent-corner").hidden = true;
    refreshStarChips();
    renderMap();
  }

  // Gate: hold the gear for 3 seconds (grown-ups only)
  var holdTimer = null;
  function gateDown() {
    holdTimer = setTimeout(function () { holdTimer = null; openParent(); }, 3000);
  }
  function gateUp() {
    if (holdTimer) {
      clearTimeout(holdTimer);
      holdTimer = null;
      var fb = $("btn-parent");
      fb.textContent = "3s";
      setTimeout(function () { fb.textContent = "⚙"; }, 1200);
    }
  }
  $("btn-parent").addEventListener("pointerdown", gateDown);
  $("btn-parent").addEventListener("pointerup", gateUp);
  $("btn-parent").addEventListener("pointerleave", gateUp);
  $("btn-parent").addEventListener("contextmenu", function (e) { e.preventDefault(); });

  function renderReport() {
    var log = store.get("log", {});
    var words = store.get("words", {});
    var html = "<div class=\"report-days\">";
    for (var d = 13; d >= 0; d--) {
      var day = new Date(Date.now() - d * 86400000);
      var key = day.toISOString().slice(0, 10);
      var n = log[key] || 0;
      html += "<span class=\"rday" + (n ? " did" : "") + "\" title=\"" + key + "\">" +
              day.getDate() + "</span>";
    }
    html += "</div>";

    var learning = [], mastered = 0;
    for (var w in words) {
      if (words[w].status === "learning") learning.push({ word: w, wrong: words[w].wrong });
      else mastered++;
    }
    learning.sort(function (a, b) { return b.wrong - a.wrong; });

    if (learning.length) {
      html += "<table class=\"report-table\"><tr><th>Still learning</th><th>Misses</th></tr>";
      learning.slice(0, 12).forEach(function (r) {
        html += "<tr><td>" + r.word + "</td><td>" + r.wrong + "</td></tr>";
      });
      html += "</table>";
    } else {
      html += "<p class=\"pc-note\">No tricky words right now 🎉</p>";
    }
    html += "<p class=\"pc-note\"><span class=\"mastered-chip\">" + mastered +
            " word" + (mastered === 1 ? "" : "s") + " mastered</span> (spelled right twice in a row after a miss).</p>";
    $("parent-report").innerHTML = html;
  }

  function renderParentSettings() {
    var s = engine.getSettings();
    $("set-items-per-round").value = String(s.itemsPerRound);
    $("set-rate").value = String(s.speechRate);
    $("rate-value").textContent = String(s.speechRate);
    var sel = $("set-voice");
    sel.innerHTML = "<option value=\"\">Automatic</option>";
    audio.listVoices().forEach(function (v) {
      var o = document.createElement("option");
      o.value = v.name;
      o.textContent = v.name + " (" + v.lang + ")";
      if (s.voiceName === v.name) o.selected = true;
      sel.appendChild(o);
    });
  }

  function renderUnlockList() {
    var box = $("unlock-list");
    box.innerHTML = "";
    engine.getLevels().forEach(function (lvl) {
      var b = document.createElement("button");
      b.className = "pc-btn unlock-item";
      b.textContent = (lvl.unlocked ? "✓ " : "🔒 ") + lvl.title;
      b.disabled = lvl.unlocked;
      b.addEventListener("click", function () {
        engine.unlockLevel(lvl.id);
        renderUnlockList();
      });
      box.appendChild(b);
    });
  }

  $("set-items-per-round").addEventListener("change", function (e) {
    engine.setSetting("itemsPerRound", parseInt(e.target.value, 10));
  });
  $("set-voice").addEventListener("change", function (e) {
    engine.setSetting("voiceName", e.target.value || null);
  });
  $("set-rate").addEventListener("input", function (e) {
    var v = parseFloat(e.target.value);
    $("rate-value").textContent = String(v);
    engine.setSetting("speechRate", v);
  });

  $("btn-export").addEventListener("click", function () {
    var blob = new Blob([store.exportAll()], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "spelling-save-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a);
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 800);
  });

  $("file-import").addEventListener("change", function (e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      if (store.importAll(String(reader.result))) {
        alert("Save restored ✓");
        renderReport();
        renderUnlockList();
        refreshStarChips();
      } else {
        alert("That file doesn't look like a save file.");
      }
      e.target.value = "";
    };
    reader.readAsText(f);
  });

  $("btn-reset").addEventListener("click", function () {
    if (confirm("Reset ALL progress (stars, levels, words)?") &&
        confirm("Really sure? This cannot be undone unless you exported a save.")) {
      store.resetAll();
      renderReport();
      renderUnlockList();
      refreshStarChips();
    }
  });

  $("btn-close-parent").addEventListener("click", closeParent);

  // ---- Start ----
  refreshStarChips();
  showScreen("screen-start");
})();

</script>
</body>
</html>
